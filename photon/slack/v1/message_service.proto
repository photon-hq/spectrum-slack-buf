// MessageService — the Slack runtime contract for spectrum-ts.
//
// See slack.md "Runtime contract (gRPC)" for the full design. Every RPC
// requires two metadata keys: `access_token` (LightAuth JWT) and `team_id`.
syntax = "proto3";
package photon.slack.v1;

import "photon/slack/v1/common.proto";

service MessageService {
  // Outbound (unary).
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);

  // Inbound. Live: server-streaming. Catch-up: unary.
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream SubscribeEventsResponse);
  rpc FetchMissedEvents(FetchMissedEventsRequest) returns (FetchMissedEventsResponse);
}

// ---------------------------------------------------------------------------
// Outbound: chat.postMessage and friends.
// ---------------------------------------------------------------------------

message SendMessageRequest {
  string channel = 1;
  oneof content {
    TextContent text = 10;
    BlocksContent blocks = 11;
    AttachmentsContent attachments = 12;
    ReactionContent reaction = 13;
  }
  optional string thread_ts = 30;
  optional bool reply_broadcast = 31;
}

message TextContent {
  string body = 1;
}

message BlocksContent {
  // Slack's Block Kit, serialized as JSON to keep us provider-faithful without
  // having to keep a parallel proto schema in lockstep with Slack changes.
  string blocks_json = 1;
  // Optional fallback text shown in notifications / clients that don't render blocks.
  string fallback_text = 2;
}

message AttachmentsContent {
  string attachments_json = 1;
  string text = 2;
}

message ReactionContent {
  string item_ts = 1;
  string item_channel = 2;
  string emoji = 3;
}

message SendMessageResponse {
  string ts = 1;
  string channel = 2;
}

// ---------------------------------------------------------------------------
// MarkRead — Slack's `conversations.mark`.
// ---------------------------------------------------------------------------

message MarkReadRequest {
  string channel = 1;
  string ts = 2;
}

message MarkReadResponse {}

// ---------------------------------------------------------------------------
// SubscribeEvents — server-streaming, live only.
// ---------------------------------------------------------------------------

message SubscribeEventsRequest {}

message SubscribeEventsResponse {
  StreamCursor cursor = 1;
  oneof payload {
    InboundMessage message = 10;
    Reaction reaction = 11;
    InteractiveCallback interactive = 12;
    SlashCommand command = 13;
    AppMention mention = 14;
    Heartbeat heartbeat = 99;
  }
}

// ---------------------------------------------------------------------------
// FetchMissedEvents — unary, replay since cursor.
// ---------------------------------------------------------------------------

message FetchMissedEventsRequest {
  StreamCursor cursor = 1;
  int32 limit = 2;
}

message FetchMissedEventsResponse {
  repeated SubscribeEventsResponse events = 1;
  // True when there are more events past `events`. Client should call again
  // with `events[events.length-1].cursor`.
  bool has_more = 2;
}
