name: check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - name: buf breaking against main
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=origin/main"
